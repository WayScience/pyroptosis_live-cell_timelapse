name: timelapse_tracking_env

channels:
  - conda-forge

dependencies:
  - python=3.12
  - ipykernel
  - jupyter
  - nbconvert
  - nb_conda_kernels
  - pip
  - numpy>2.0
  - matplotlib
  - seaborn
  - pandas
  - scipy
  - scikit-learn
  - scikit-image
  - pytorch=*=*cuda*
  - torchvision
  - torchaudio
  - cuda-version=12.4  # driver supports up to 13.0, but pin to the highest version conda-forge's pytorch build actually supports; verify with `conda search conda-forge::cuda-version` and `conda search conda-forge::pytorch`
  - coincbc  # alternative to gurobi for commercial use
  - pyarrow
  - napari
  - gurobi::gurobi  # must be a University license, no commercial use
  - pip:
      - bioio
      - hoct[bioio]
      - tifffile
      - ultrack
      - optuna
      - natsort
      - pynvml
      - -e ../utils
